<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ngaji Yuk! — Belajar Al-Qur'an</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ⭐ SPLASH SCREEN -->
<div id="splash" class="screen active">
    <div class="splash-bg">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
        <div class="circle c3"></div>
        <div class="circle c4"></div>
        <div class="circle c5"></div>
    </div>
    <div class="splash-content">
        <div class="splash-icon">📖</div>
        <h1 class="splash-title">Ngaji Yuk!</h1>
        <p class="splash-sub">Belajar Al-Qur'an itu menyenangkan</p>
        <button id="btnMulai" class="btn-gold">Mulai Sekarang →</button>
        <p class="splash-kredit">Aplikasi dibuat oleh <strong>Ganst-Studio</strong></p>
    </div>
</div>

<!-- ⭐ HURUF HIJAIYAH -->
<div id="huruf" class="screen" style="display:none">
    <div class="header-huruf">
        <div class="header-inner">
            <h1>🔤 Huruf Hijaiyah</h1>
            <p>Tap huruf untuk belajar — tap 🔊 untuk dengar VO</p>
        </div>
    </div>

    <div class="body-huruf" id="bodyHuruf"></div>

    <!-- Detail Panel -->
    <div id="detailPanel" class="detail-layer" style="display:none">
        <div class="detail-backdrop" onclick="tutupDetail()"></div>
        <div class="detail-card">
            <div class="detail-head">
                <button class="detail-close" onclick="tutupDetail()">✕</button>
            </div>
            <div id="detailContent" class="detail-body"></div>
        </div>
    </div>
</div>

<audio id="audioPlayer" style="display:none"></audio>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
